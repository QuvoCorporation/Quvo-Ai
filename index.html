<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --user-msg-bg: #e7f3ff;
            --ai-msg-bg: #f8f9fa;
            --text-color: #1a1a1a;
            --accent-color: #1a73e8;
            --border-color: #ddd;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; background: var(--chat-bg); }
        #chat-view { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        /* ホーム画面 */
        #home-screen { text-align: center; margin-top: 10vh; }
        #home-screen h2 { font-size: 2rem; color: #444; }
        .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 20px auto; }
        .suggestion-btn { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; cursor: pointer; text-align: left; }
        .suggestion-btn:hover { background: #f1f3f4; }

        /* メッセージ */
        .message-row { display: flex; margin-bottom: 24px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-row.user { justify-content: flex-end; }
        .message-content { max-width: 85%; padding: 12px 18px; border-radius: 18px; line-height: 1.6; font-size: 15px; }
        .user .message-content { background: var(--user-msg-bg); border-bottom-right-radius: 4px; }
        .ai .message-content { background: var(--ai-msg-bg); border-top-left-radius: 4px; border: 1px solid #eee; }
        
        /* コード表示 */
        pre { background: #202124; color: #fff; padding: 15px; border-radius: 8px; overflow-x: auto; position: relative; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #5f6368; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        /* 入力エリア */
        #input-area { background: #fff; padding: 15px; border-top: 1px solid #ddd; }
        .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; align-items: flex-end; border: 1px solid #ccc; border-radius: 24px; padding: 5px 15px; background: #f8f9fa; }
        textarea { flex: 1; border: none; background: transparent; padding: 10px; outline: none; resize: none; max-height: 150px; font-size: 16px; }
        .btn { border: none; background: none; cursor: pointer; padding: 8px; font-size: 20px; color: #5f6368; }
        #send-btn { color: var(--accent-color); }
        #send-btn:disabled { color: #ccc; }
        #loading { display: none; text-align: center; color: #888; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: #1a73e8;">Gemini Pro</div>
    <div style="width: 32px; height: 32px; background: #1a73e8; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center;">Y</div>
</header>

<main id="main-scroll">
    <div id="chat-view">
        <div id="home-screen">
            <h2>こんにちは！</h2>
            <p>今日はどんなお手伝いをしましょうか？</p>
            <div class="suggestions">
                <button class="suggestion-btn" onclick="quickSend('今日の夕飯の献立を3つ提案して')">🍳 献立の提案</button>
                <button class="suggestion-btn" onclick="quickSend('面白い雑学を教えて')">💡 雑学を教えて</button>
                <button class="suggestion-btn" onclick="quickSend('HTMLとCSSでボタンをおしゃれにする方法')">💻 プログラミング</button>
                <button class="suggestion-btn" onclick="quickSend('元気が出る言葉をかけて')">🌟 励まして</button>
            </div>
        </div>
    </div>
</main>

<div id="loading">Geminiが考え中...</div>

<div id="input-area">
    <div class="input-wrapper">
        <button class="btn" onclick="alert('画像解析機能は実装準備中です！')">＋</button>
        <textarea id="user-input" placeholder="Gemini に相談する" rows="1"></textarea>
        <button id="send-btn" class="btn" disabled>➤</button>
    </div>
</div>

<script>
    // 設定
    const API_KEY = 'AIzaSyDD0XKMHOtr_7EVqey8H0B1Da4naK91bHA'; // あなたのキー
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const chatView = document.getElementById('chat-view');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');
    const mainScroll = document.getElementById('main-scroll');

    // マークダウン設定
    const renderer = new marked.Renderer();
    renderer.code = (code, lang) => `<pre><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>${code}</code></pre>`;
    marked.setOptions({ renderer, breaks: true });

    // 入力欄の自動伸長
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
        sendBtn.disabled = !userInput.value.trim();
    });

    async function sendMessage(text) {
        if (!text) return;
        
        // UI更新
        document.getElementById('home-screen').style.display = 'none';
        appendMessage('user', text);
        userInput.value = '';
        userInput.style.height = 'auto';
        sendBtn.disabled = true;
        loading.style.display = 'block';

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            const aiText = data.candidates[0].content.parts[0].text;
            appendMessage('ai', aiText);
        } catch (e) {
            appendMessage('ai', 'エラーが発生しました。接続を確認してください。');
        } finally {
            loading.style.display = 'none';
            sendBtn.disabled = false;
        }
    }

    function appendMessage(role, text) {
        const row = document.createElement('div');
        row.className = `message-row ${role}`;
        const content = document.createElement('div');
        content.className = 'message-content';
        content.innerHTML = role === 'ai' ? marked.parse(text) : text;
        row.appendChild(content);
        chatView.appendChild(row);
        mainScroll.scrollTop = mainScroll.scrollHeight;
    }

    function quickSend(text) {
        sendMessage(text);
    }

    function copyCode(btn) {
        const code = btn.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = 'Copied!';
        setTimeout(() => btn.innerText = 'Copy', 2000);
    }

    sendBtn.onclick = () => sendMessage(userInput.value.trim());
    userInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(userInput.value.trim()); } };
</script>

</body>
</html>
